[package]
name = "cargo-nx-gen"
version = "0.2.0"
edition = "2024"
publish = false

[build-dependencies]
cargo-nx = { path = ".." }

[target.'cfg(gen_schema_npdm)'.build-dependencies]
cargo-nx = { path = "..", features = ["json-schema"] }
schemars = "1"
serde_json = "1"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(gen_schema_npdm)'] }
